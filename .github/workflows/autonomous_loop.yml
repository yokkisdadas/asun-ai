name: Asun AI Autonomous Loop

on:
  schedule:
    - cron: '0 */2 * * *' # Her 2 saatte bir otomatik çalışır
  workflow_dispatch: # Elinle başlatabilmen için buton ekler

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Klonla
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 sürümünün güvenli Node 24 kodu

      - name: Python Kur
        uses: actions/setup-python@0b93645e9fb717616d123507d9173d12a95e638a # v5.3.0 sürümünün güvenli Node 24 kodu
        with:
          python-version: '3.11'

      - name: Kütüphaneleri Yükle
        run: |
          pip install -r requirements.txt

      - name: Asun AI API'yi Test Et ve Çalıştır
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "import main; print('Asun AI API Modülü Başarıyla Yüklendi ve Derlendi.')"
